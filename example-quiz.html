<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квиз: Древний Рим ⚽</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Montserrat:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .quiz-container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .quiz-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 60%);
            animation: rotateGlow 15s linear infinite;
            pointer-events: none;
        }

        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .header h1 {
            font-family: 'Unbounded', sans-serif;
            font-size: 2.5rem;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            margin-bottom: 10px;
        }

        .header .subtitle {
            font-size: 1.1rem;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .header .subtitle span {
            color: #ffd700;
            font-weight: 700;
        }

        .score-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .score-item {
            text-align: center;
        }

        .score-item .label {
            font-size: 0.8rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-item .value {
            font-family: 'Unbounded', sans-serif;
            font-size: 1.8rem;
            color: #ffd700;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff8c00, #ffd700);
            border-radius: 10px;
            transition: width 0.5s ease;
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .question-card {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            position: relative;
            z-index: 1;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .question-number {
            font-family: 'Unbounded', sans-serif;
            font-size: 0.9rem;
            color: #ff8c00;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 1.3rem;
            color: #ffffff;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 18px 20px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .option-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 140, 0, 0.2));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .option-btn:hover {
            border-color: #ffd700;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
        }

        .option-btn:hover::before {
            opacity: 1;
        }

        .option-btn.correct {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.15);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }

        .option-btn.wrong {
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.15);
            box-shadow: 0 0 30px rgba(255, 68, 68, 0.3);
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .option-btn .option-letter {
            display: inline-block;
            width: 30px;
            height: 30px;
            line-height: 30px;
            text-align: center;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 8px;
            margin-right: 10px;
            font-family: 'Unbounded', sans-serif;
            font-size: 0.9rem;
        }

        .feedback {
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            animation: fadeIn 0.3s ease;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct-feedback {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }

        .feedback.wrong-feedback {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff6b6b;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .next-btn {
            display: none;
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            border-radius: 15px;
            color: #1a1a2e;
            font-family: 'Unbounded', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .next-btn.show {
            display: block;
        }

        .start-screen, .result-screen {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .start-screen .logo {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .start-btn, .restart-btn {
            padding: 20px 50px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            border-radius: 20px;
            color: #1a1a2e;
            font-family: 'Unbounded', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s ease;
        }

        .result-screen .result-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .result-screen h2 {
            font-family: 'Unbounded', sans-serif;
            font-size: 2rem;
            color: #ffd700;
            margin-bottom: 15px;
        }

        .result-screen .result-score {
            font-family: 'Unbounded', sans-serif;
            font-size: 3.5rem;
            color: #ffffff;
            margin: 20px 0;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.5);
        }

        .result-screen .result-message {
            font-size: 1.2rem;
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .result-screen .gazmanov-quote {
            font-style: italic;
            color: #ff8c00;
            font-size: 1.1rem;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 140, 0, 0.1);
            border-radius: 10px;
            border-left: 4px solid #ff8c00;
        }

        .confetti {
            position: fixed;
            top: -10px;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            pointer-events: none;
            z-index: 1000;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 600px) {
            .quiz-container {
                padding: 25px 20px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .options-grid {
                grid-template-columns: 1fr;
            }

            .question-text {
                font-size: 1.1rem;
            }

            .score-bar {
                flex-wrap: wrap;
                gap: 10px;
            }

            .score-item .value {
                font-size: 1.4rem;
            }
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .timer-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff8c00, #ffd700);
            border-radius: 3px;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="quiz-container">
        <div class="start-screen" id="startScreen">
            <div class="logo">🏛️⚽</div>
            <div class="header">
                <h1>ДРЕВНИЙ РИМ</h1>
                <p class="subtitle">
                    Квиз для настоящих <span>чемпионов</span>!<br>
                    Как говорил Газманов: <span>«Вперёд, Россия!»</span> 🇷🇺<br>
                    А мы скажем: <span>«Вперёд, к победам Рима!»</span> 🏆
                </p>
            </div>
            <button class="start-btn" onclick="startQuiz()">🏟️ Начать матч!</button>
            <p style="color: #888; margin-top: 15px; font-size: 0.9rem;">10 вопросов • У тебя будет 30 секунд на вопрос</p>
        </div>
        <div class="hidden" id="quizScreen">
            <div class="header"><h1>🏛️ ДРЕВНИЙ РИМ ⚽</h1></div>
            <div class="score-bar">
                <div class="score-item"><div class="label">Вопрос</div><div class="value" id="currentQ">1/10</div></div>
                <div class="score-item"><div class="label">Очки</div><div class="value" id="score">0</div></div>
                <div class="score-item"><div class="label">Стрик</div><div class="value" id="streak">🔥0</div></div>
            </div>
            <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width: 100%"></div></div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>
            <div class="question-card" id="questionCard">
                <div class="question-number" id="questionNumber">Вопрос 1 из 10</div>
                <div class="question-text" id="questionText"></div>
                <div class="options-grid" id="optionsGrid"></div>
                <div class="feedback" id="feedback"></div>
            </div>
            <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Следующий вопрос →</button>
        </div>
        <div class="hidden" id="resultScreen">
            <div class="result-screen">
                <div class="result-icon" id="resultIcon">🏆</div>
                <h2 id="resultTitle">Матч окончен!</h2>
                <div class="result-score" id="resultScore">0/10</div>
                <div class="result-message" id="resultMessage"></div>
                <div class="gazmanov-quote" id="gazmanovQuote"></div>
                <button class="restart-btn" onclick="restartQuiz()">🔄 Переигровка!</button>
            </div>
        </div>
    </div>
    <script>
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.width = Math.random() * 3 + 1 + 'px';
            star.style.height = star.style.width;
            starsContainer.appendChild(star);
        }

        const quizData = [
            { question: "🏟️ Как назывался самый большой стадион Рима?", options: ["Парфенон", "Колизей", "Пантеон", "Цирк"], correct: 1, explanation: "Колизей — самый знаменитый стадион Древнего Рима!" },
            { question: "⚽ Как назывался город, из которого правил император?", options: ["Афины", "Рим", "Карфаген", "Александрия"], correct: 1, explanation: "Рим — столица великой империи!" },
            { question: "🎵 Кто перешёл реку Рубикон со словами «Жребий брошен!»?", options: ["Август", "Нерон", "Юлий Цезарь", "Калигула"], correct: 2, explanation: "Юлий Цезарь перешёл Рубикон в 49 году до н.э." },
            { question: "🏛️ Как назывался храм всех богов с огромным куполом?", options: ["Колизей", "Пантеон", "Базилика", "Арена"], correct: 1, explanation: "Пантеон — храм всех богов." },
            { question: "⚔️ Как назывался жест большим пальцем?", options: ["Thumbs Up", "Pollice Verso", "Ave Caesar", "Manus Iusta"], correct: 1, explanation: "Pollice Verso — «повёрнутый палец»." },
            { question: "🌍 Какое море римляне называли «Наше море»?", options: ["Чёрное море", "Красное море", "Средиземное море", "Балтийское море"], correct: 2, explanation: "Mare Nostrum — Средиземное море." },
            { question: "📜 Как назывался свод законов на 12 таблицах?", options: ["12 заповедей", "12 таблиц", "Кодекс Хаммурапи", "Великая хартия"], correct: 1, explanation: "Законы XII таблиц — основа римского права." },
            { question: "🛡️ Как называлось построение «черепаха»?", options: ["Фаланга", "Клин", "Черепаха (Testudo)", "Стена"], correct: 2, explanation: "Testudo — «черепаха»." },
            { question: "💧 Как назывались сооружения для подачи воды?", options: ["Мосты", "Акведуки", "Каналы", "Фонтаны"], correct: 1, explanation: "Акведуки — водопроводы Древнего Рима." },
            { question: "🎤 Кто был последним императором Западной Рима?", options: ["Ромул Августул", "Юстиниан", "Константин", "Диоклетиан"], correct: 0, explanation: "Ромул Августул — последний император." }
        ];

        let currentQuestion = 0;
        let score = 0;
        let streak = 0;
        let timer = null;
        let timeLeft = 30;
        let answered = false;

        function startQuiz() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            answered = false;
            timeLeft = 30;
            const q = quizData[currentQuestion];
            document.getElementById('currentQ').textContent = `${currentQuestion + 1}/10`;
            document.getElementById('questionNumber').textContent = `Вопрос ${currentQuestion + 1} из 10`;
            document.getElementById('questionText').innerHTML = q.question;
            document.getElementById('progressFill').style.width = `${(currentQuestion / 10) * 100}%`;
            const optionsGrid = document.getElementById('optionsGrid');
            optionsGrid.innerHTML = '';
            const letters = ['А', 'Б', 'В', 'Г'];
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="option-letter">${letters[idx]}</span> ${opt}`;
                btn.onclick = () => selectAnswer(idx, btn);
                optionsGrid.appendChild(btn);
            });
            document.getElementById('feedback').classList.remove('show', 'correct-feedback', 'wrong-feedback');
            document.getElementById('nextBtn').classList.remove('show');
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            const timerFill = document.getElementById('timerFill');
            timerFill.style.width = '100%';
            timer = setInterval(() => {
                timeLeft -= 0.1;
                timerFill.style.width = `${(timeLeft / 30) * 100}%`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    if (!answered) timeUp();
                }
            }, 100);
        }

        function timeUp() {
            answered = true;
            streak = 0;
            document.getElementById('streak').textContent = `🔥${streak}`;
            const q = quizData[currentQuestion];
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach((btn, idx) => {
                btn.style.pointerEvents = 'none';
                if (idx === q.correct) btn.classList.add('correct');
            });
            const feedback = document.getElementById('feedback');
            feedback.className = 'feedback show wrong-feedback';
            feedback.innerHTML = `⏰ Время вышло! ${q.explanation}`;
            document.getElementById('nextBtn').classList.add('show');
        }

        function selectAnswer(idx, btn) {
            if (answered) return;
            answered = true;
            clearInterval(timer);
            const q = quizData[currentQuestion];
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach((b) => { b.style.pointerEvents = 'none'; });
            if (idx === q.correct) {
                btn.classList.add('correct');
                score += 10 + Math.floor(timeLeft);
                streak++;
                document.getElementById('score').textContent = score;
                document.getElementById('streak').textContent = `🔥${streak}`;
                const feedback = document.getElementById('feedback');
                feedback.className = 'feedback show correct-feedback';
                feedback.innerHTML = `⚽ Гол! ${q.explanation}`;
            } else {
                btn.classList.add('wrong');
                buttons[q.correct].classList.add('correct');
                streak = 0;
                document.getElementById('streak').textContent = `🔥${streak}`;
                const feedback = document.getElementById('feedback');
                feedback.className = 'feedback show wrong-feedback';
                feedback.innerHTML = `😔 Мимо ворот! ${q.explanation}`;
            }
            document.getElementById('nextBtn').classList.add('show');
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion >= quizData.length) {
                showResults();
            } else {
                loadQuestion();
            }
        }

        function showResults() {
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.remove('hidden');
            document.getElementById('resultScore').textContent = `${score} очков`;
            document.getElementById('resultIcon').textContent = score >= 100 ? '🏆⚽' : score >= 70 ? '🥈⚽' : score >= 40 ? '🥉' : '📚⚽';
            document.getElementById('resultTitle').textContent = score >= 100 ? 'Чемпион Рима!' : score >= 70 ? 'Отличная игра!' : score >= 40 ? 'Неплохой старт!' : 'Нужна тренировка!';
            document.getElementById('resultMessage').textContent = score >= 100 ? 'Ты настоящий гладиатор знаний!' : score >= 70 ? 'Ты отлично знаешь Древний Рим!' : score >= 40 ? 'Есть над чем поработать.' : 'Не расстраивайся и попробуй снова!';
            document.getElementById('gazmanovQuote').textContent = '🎵 Вперёд к новым победам!';
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            streak = 0;
            answered = false;
            document.getElementById('score').textContent = '0';
            document.getElementById('streak').textContent = '🔥0';
            document.getElementById('resultScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');
            loadQuestion();
        }
    </script>
</body>
</html>

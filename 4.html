<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Угадай страну по флагу</title>
    <link href="https://cdn.jsdelivr.net/npm/fontsource-inter@5.0.16/index.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow-x: hidden;
        }
        .game-container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            margin: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats {
            display: flex;
            gap: 16px;
            font-size: 0.95rem;
        }
        .stat {
            background: rgba(255,255,255,0.1);
            padding: 6px 14px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        .stat span { font-weight: 700; color: #ffd200; }
        .card {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 30px 24px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .flag-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }
        .flag-box {
            width: 240px;
            height: 160px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            border: 3px solid rgba(255,255,255,0.15);
            background: #2a2a4a;
            transition: transform 0.3s;
        }
        .flag-box:hover { transform: scale(1.03); }
        .flag-box svg { width: 100%; height: 100%; display: block; }
        .question-text {
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 20px;
            opacity: 0.85;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .options-grid .option-btn:last-child:nth-child(odd) {
            grid-column: 1 / -1;
            max-width: 50%;
            justify-self: center;
        }
        .option-btn {
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.15);
            color: #fff;
            padding: 14px 12px;
            border-radius: 14px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.25s;
            font-weight: 500;
        }
        .option-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.18);
            border-color: #ffd200;
            transform: translateY(-2px);
        }
        .option-btn:disabled { cursor: default; }
        .option-btn.correct {
            background: rgba(46, 213, 115, 0.3) !important;
            border-color: #2ed573 !important;
            animation: pulse-green 0.5s;
        }
        .option-btn.wrong {
            background: rgba(255, 71, 87, 0.3) !important;
            border-color: #ff4757 !important;
            animation: shake 0.4s;
        }
        @keyframes pulse-green {
            0% { transform: scale(1); } 50% { transform: scale(1.04); } 100% { transform: scale(1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        .hint-section { margin-bottom: 16px; }
        .hint-btn {
            width: 100%;
            background: linear-gradient(90deg, #a18cd1, #fbc2eb);
            border: none;
            color: #1a1a2e;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .hint-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(161,140,209,0.4); }
        .hint-btn:disabled { opacity: 0.4; cursor: default; }
        .hint-display {
            margin-top: 10px;
            padding: 12px 16px;
            background: rgba(161,140,209,0.15);
            border-radius: 10px;
            font-size: 0.9rem;
            display: none;
            animation: fadeIn 0.3s;
            border-left: 3px solid #a18cd1;
        }
        .hint-display.visible { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

        .fact-card {
            margin-top: 16px;
            padding: 16px 20px;
            border-radius: 14px;
            font-size: 0.95rem;
            line-height: 1.5;
            display: none;
            animation: slideUp 0.4s;
        }
        .fact-card.visible { display: block; }
        .fact-card.fact-correct {
            background: rgba(46, 213, 115, 0.12);
            border: 1px solid rgba(46, 213, 115, 0.3);
        }
        .fact-card.fact-wrong {
            background: rgba(255, 71, 87, 0.12);
            border: 1px solid rgba(255, 71, 87, 0.3);
        }
        .fact-card .fact-title {
            font-weight: 700;
            margin-bottom: 6px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .next-btn {
            width: 100%;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            border: none;
            color: #1a1a2e;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.25s;
            margin-top: 16px;
            display: none;
        }
        .next-btn.visible { display: block; }
        .next-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(247,151,30,0.4); }

        .result-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: none; justify-content: center; align-items: center;
            z-index: 100; backdrop-filter: blur(5px);
        }
        .result-overlay.visible { display: flex; animation: fadeIn 0.4s; }
        .result-card {
            background: linear-gradient(135deg, #1a1a2e, #302b63);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px; padding: 40px 30px; text-align: center;
            max-width: 400px; width: 90%; animation: scaleIn 0.4s;
        }
        @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .result-card h2 {
            font-size: 1.8rem; margin-bottom: 10px;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .result-emoji { font-size: 4rem; margin-bottom: 16px; }
        .result-score { font-size: 3rem; font-weight: 800; color: #ffd200; margin: 16px 0; }
        .result-detail { font-size: 1rem; opacity: 0.7; margin-bottom: 24px; }
        .restart-btn {
            background: linear-gradient(90deg, #f7971e, #ffd200); border: none;
            color: #1a1a2e; padding: 14px 40px; border-radius: 12px;
            font-size: 1rem; font-family: 'Inter', sans-serif; cursor: pointer;
            font-weight: 700; transition: all 0.25s;
        }
        .restart-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(247,151,30,0.4); }
        .streak-badge {
            display: inline-block; background: linear-gradient(90deg, #ff6b6b, #ffa502);
            color: #fff; padding: 4px 12px; border-radius: 20px;
            font-size: 0.8rem; font-weight: 600; margin-left: 8px; animation: fadeIn 0.3s;
        }
        .round-indicator { text-align: center; font-size: 0.85rem; opacity: 0.5; margin-bottom: 16px; }
        @media (max-width: 480px) {
            .game-container { padding: 12px; margin: 10px; }
            .card { padding: 20px 16px; }
            .flag-box { width: 200px; height: 133px; }
            .options-grid { grid-template-columns: 1fr; }
            .options-grid .option-btn:last-child:nth-child(odd) { max-width: 100%; }
            .header h1 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🌍 Угадай страну по флагу</h1>
            <div class="stats">
                <div class="stat">Очки: <span id="score">0</span></div>
                <div class="stat">Вопрос: <span id="question-num">1</span>/<span id="total-questions">10</span></div>
            </div>
        </div>
        <div class="round-indicator" id="streak-container"></div>
        <div class="card">
            <div class="flag-wrapper">
                <div class="flag-box" id="flag-box"></div>
            </div>
            <p class="question-text">Какой стране принадлежит этот флаг?</p>
            <div class="options-grid" id="options"></div>
            <div class="hint-section">
                <button class="hint-btn" id="hint-btn" onclick="showHint()">
                    💡 Показать подсказку (<span id="hints-left">2</span> осталось)
                </button>
                <div class="hint-display" id="hint-display"></div>
            </div>
            <div class="fact-card" id="fact-card">
                <div class="fact-title">📖 Интересный факт</div>
                <div id="fact-text"></div>
            </div>
            <button class="next-btn" id="next-btn" onclick="nextRound()">Следующий вопрос →</button>
        </div>
    </div>
    <div class="result-overlay" id="result-overlay">
        <div class="result-card">
            <div class="result-emoji" id="result-emoji">🏆</div>
            <h2>Игра окончена!</h2>
            <div class="result-score" id="result-score">0</div>
            <p class="result-detail" id="result-detail"></p>
            <button class="restart-btn" onclick="restartGame()">🔄 Играть снова</button>
        </div>
    </div>

      { name: "Греция", code: "gr", capital: "Афины", continent: "Европа", hint: "Колыбель демократии", fact: "Древние Олимпийские игры зародились в Греции в 776 году до н.э. Греция — родина театра, демократии и философии." },
      { name: "Марокко", code: "ma", capital: "Рабат", continent: "Африка", hint: "Красный флаг с зелёной звездой", fact: "В Марокко находится старейший в мире университет — Аль-Карауин в Фесе, основанный в 859 году." },
      { name: "Таиланд", code: "th", capital: "Бангкок", continent: "Азия", hint: "Страна улыбок", fact: "Таиланд — единственная страна Юго-Восточной Азии, которая никогда не была европейской колонией. Его называют «Страной улыбок»." },
      { name: "Польша", code: "pl", capital: "Варшава", continent: "Европа", hint: "Бело-красный флаг", fact: "Польша — родина Марии Кюри, Фредерика Шопена и Николая Коперника. Варшавский Старый город был полностью восстановлен после войны." },
      { name: "Китай", code: "cn", capital: "Пекин", continent: "Азия", hint: "Красный флаг с пятью звёздами", fact: "Великая Китайская стена протянулась более чем на 21 000 км. Китай изобрёл бумагу, порох, компас и книгопечатание." },
      { name: "Великобритания", code: "gb", capital: "Лондон", continent: "Европа", hint: "Юнион Джек", fact: "Лондонское метро — старейшее в мире, открыто в 1863 году. Британская монархия — одна из старейших непрерывных в мире." },
      { name: "США", code: "us", capital: "Вашингтон", continent: "Северная Америка", hint: "50 звёзд на синем фоне", fact: "В США находится самый посещаемый национальный парк в мире — Большой Каньон, которому более 5 миллионов лет." },
      { name: "Португалия", code: "pt", capital: "Лиссабон", continent: "Европа", hint: "Красно-зелёный флаг с гербом", fact: "Португалия — старейшее государство Европы с неизменными границами с 1139 года. Лиссабон старше Рима." },
      { name: "Нидерланды", code: "nl", capital: "Амстердам", continent: "Европа", hint: "Оранжевый цвет и тюльпаны", fact: "Около 26% территории Нидерландов находится ниже уровня моря. Страна — мировой лидер по экспорту тюльпанов и сыра." },
      { name: "Швейцария", code: "ch", capital: "Берн", continent: "Европа", hint: "Красный квадратный флаг с белым крестом", fact: "Швейцария не участвовала в войнах с 1815 года. Здесь находятся Альпы, а шоколадные плитки здесь изобретены именно в этой стране." },
      { name: "Нигерия", code: "ng", capital: "Абуджа", continent: "Африка", hint: "Самая населённая страна Африки", fact: "Нигерия — самая населённая страна Африки (более 220 млн человек). Лагос — один из самых быстрорастущих городов мира." },
      { name: "Вьетнам", code: "vn", capital: "Ханой", continent: "Азия", hint: "Красный флаг с жёлтой звездой", fact: "Вьетнам — второй в мире экспортёр кофе. Здесь находится крупнейшая в мире пещера — Шондонг." },
      { name: "Чили", code: "cl", capital: "Сантьяго", continent: "Южная Америка", hint: "Похож на флаг Техаса", fact: "Чили — самая длинная и узкая страна мира, протяжённостью 4300 км. Здесь находится самое сухое место на Земле — пустыня Атакама." },
      { name: "Исландия", code: "is", capital: "Рейкьявик", continent: "Европа", hint: "Огненная страна льда", fact: "Исландия — одна из самых малонаселённых стран мира. Практически вся энергия страны вырабатывается из геотермальных и гидроисточников." },
      { name: "Финляндия", code: "fi", capital: "Хельсинки", continent: "Европа", hint: "Страна тысяч озёр", fact: "В Финляндии более 187 000 озёр и 179 000 островов. Финны — счастливейший народ мира по данным ООН уже несколько лет подряд." },
      { name: "Кения", code: "ke", capital: "Найроби", continent: "Африка", hint: "Сафари и масаи", fact: "Кения — родина марафонского бега. Кенийские спортсмены доминируют в мировых марафонах уже несколько десятилетий." },
      { name: "Иран", code: "ir", capital: "Тегеран", continent: "Азия", hint: "Бывшая Персия", fact: "Иран — родина древней Персии. Персидский ковёр считается одним из величайших произведений декоративно-прикладного искусства." },
      { name: "Колумбия", code: "co", capital: "Богота", continent: "Южная Америка", hint: "Жёлтый, синий, красный", fact: "Колумбия — второй в мире производитель кофе и крупнейший производитель изумрудов. Здесь обитает около 20% видов птиц планеты." },
      { name: "Перу", code: "pe", capital: "Лима", continent: "Южная Америка", hint: "Мачу-Пикчу", fact: "Мачу-Пикчу — затерянный город инков, обнаруженный только в 1911 году. Картофель был впервые одомашнен именно в Перу." }
    ];

    let currentRound = 0;
    let totalRounds = 10;
    let score = 0;
    let streak = 0;
    let maxStreak = 0;
    let currentCountry = null;
    let hintsUsed = 0;
    let maxHints = 2;
    let hintsRevealed = [];
    let gameCountries = [];
    let answered = false;

    function shuffleArray(arr) {
      const shuffled = [...arr];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    function initGame() {
      gameCountries = shuffleArray(countries).slice(0, totalRounds);
      currentRound = 0;
      score = 0;
      streak = 0;
      maxStreak = 0;
      updateUI();
      loadRound();
    }

    function loadRound() {
      answered = false;
      hintsUsed = 0;
      hintsRevealed = [];
      currentCountry = gameCountries[currentRound];

      document.getElementById('flag-box').innerHTML = flagSVGs[currentCountry.code];

      let wrongOptions = countries.filter(c => c.name !== currentCountry.name);
      wrongOptions = shuffleArray(wrongOptions).slice(0, 4);
      let options = shuffleArray([currentCountry, ...wrongOptions]);

      const optionsContainer = document.getElementById('options');
      optionsContainer.innerHTML = '';

      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt.name;
        btn.onclick = () => selectAnswer(btn, opt);
        optionsContainer.appendChild(btn);
      });

      const hintBtn = document.getElementById('hint-btn');
      hintBtn.disabled = false;
      document.getElementById('hints-left').textContent = maxHints;
      document.getElementById('hint-display').classList.remove('visible');
      document.getElementById('hint-display').innerHTML = '';

      const factCard = document.getElementById('fact-card');
      factCard.classList.remove('visible');
      factCard.classList.remove('fact-correct', 'fact-wrong');

      document.getElementById('next-btn').classList.remove('visible');
    }

    function selectAnswer(btn, selected) {
      if (answered) return;
      answered = true;

      const allBtns = document.querySelectorAll('.option-btn');
      allBtns.forEach(b => b.disabled = true);

      const isCorrect = selected.name === currentCountry.name;

      if (isCorrect) {
        btn.classList.add('correct');
        let points = 10;
        if (hintsUsed === 0) points += 5;
        else if (hintsUsed === 1) points += 2;
        streak++;
        if (streak > maxStreak) maxStreak = streak;
        score += points;
      } else {
        btn.classList.add('wrong');
        streak = 0;
        allBtns.forEach(b => {
          if (b.textContent === currentCountry.name) b.classList.add('correct');
        });
      }

      // Show fact
      const factCard = document.getElementById('fact-card');
      factCard.className = 'fact-card visible ' + (isCorrect ? 'fact-correct' : 'fact-wrong');
      document.getElementById('fact-text').innerHTML = `<strong>${currentCountry.name}:</strong> ${currentCountry.fact}`;

      updateUI();

      if (currentRound < totalRounds - 1) {
        document.getElementById('next-btn').classList.add('visible');
      } else {
        setTimeout(showResults, 1200);
      }
    }

    function showHint() {
      if (hintsUsed >= maxHints || answered) return;
      hintsUsed++;
      document.getElementById('hints-left').textContent = maxHints - hintsUsed;

      const hintDisplay = document.getElementById('hint-display');
      hintDisplay.classList.add('visible');

      const availableHints = [];
      if (!hintsRevealed.includes('capital')) availableHints.push({ key: 'capital', text: `🏙️ Столица начинается на "${currentCountry.capital[0]}"` });
      if (!hintsRevealed.includes('continent')) availableHints.push({ key: 'continent', text: `🌐 Континент: ${currentCountry.continent}` });
      if (!hintsRevealed.includes('hint')) availableHints.push({ key: 'hint', text: `💬 ${currentCountry.hint}` });
      if (!hintsRevealed.includes('letter')) availableHints.push({ key: 'letter', text: `🔤 Первая буква: "${currentCountry.name[0]}"` });

      const remaining = availableHints.filter(h => !hintsRevealed.includes(h.key));

      if (remaining.length > 0) {
        const chosen = remaining[Math.floor(Math.random() * remaining.length)];
        hintsRevealed.push(chosen.key);
        hintDisplay.innerHTML = chosen.text;
      }

      if (hintsUsed >= maxHints) document.getElementById('hint-btn').disabled = true;
    }

    function nextRound() {
      currentRound++;
      loadRound();
      updateUI();
    }

    function updateUI() {
      document.getElementById('score').textContent = score;
      document.getElementById('question-num').textContent = currentRound + 1;

      const streakContainer = document.getElementById('streak-container');
      if (streak >= 2) {
        streakContainer.innerHTML = `🔥 Серия: ${streak} <span class="streak-badge">+${streak * 2} бонус</span>`;
      } else {
        streakContainer.innerHTML = '';
      }
    }

    function showResults() {
      const overlay = document.getElementById('result-overlay');
      overlay.classList.add('visible');

      document.getElementById('result-score').textContent = `${score} очков`;

      let emoji, detail;
      const percentage = score / (totalRounds * 15);
      if (percentage >= 0.9) { emoji = '🏆'; detail = 'Невероятно! Вы настоящий географ!'; }
      else if (percentage >= 0.7) { emoji = '🌟'; detail = 'Отличный результат! Так держать!'; }
      else if (percentage >= 0.5) { emoji = '👍'; detail = 'Хорошо! Но есть куда расти.'; }
      else if (percentage >= 0.3) { emoji = '📚'; detail = 'Неплохо, но стоит подучить географию.'; }
      else { emoji = '🗺️'; detail = 'Попробуйте ещё раз — практика помогает!'; }

      document.getElementById('result-emoji').textContent = emoji;
      document.getElementById('result-detail').textContent = detail;
    }

    function restartGame() {
      document.getElementById('result-overlay').classList.remove('visible');
      initGame();
    }

    initGame();
    </script>
